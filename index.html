<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PRO SCRIM SYSTEM</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(120deg,#000,#111,#000);
  color:white;
  text-align:center;
}

h1{
  margin-top:15px;
  color:#00ffcc;
  text-shadow:0 0 10px #00ffcc;
}

input,select,button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:6px;
}

button{
  cursor:pointer;
  font-weight:bold;
}

.add{background:#00ffcc;}
.reset{background:#ff0033;color:white;}
.wh{background:#25D366;color:white;}

table{
  width:95%;
  margin:auto;
  margin-top:20px;
  border-collapse:collapse;
  background:#0d0d0d;
  box-shadow:0 0 15px #00ffcc33;
}

th,td{
  border:1px solid #222;
  padding:8px;
}

th{
  background:#00ffcc;
  color:black;
}

tr:hover{
  background:#1a1a1a;
}
</style>
</head>

<body>

<h1>🔥 PRO SCRIM SYSTEM</h1>

<select id="team"></select>
<input id="rank" placeholder="Rank (1-20)">
<input id="kill" placeholder="Kills">

<br>

<button class="add" onclick="add()">ADD MATCH</button>
<button class="reset" onclick="resetAll()">RESET</button>
<button class="wh" onclick="sendWhatsApp()">WHATSAPP RESULT</button>

<table>
<thead>
<tr>
<th>Team</th>
<th>Match</th>
<th>Rank</th>
<th>Kills</th>
<th>Points</th>
<th>Delete</th>
</tr>
</thead>

<tbody id="list"></tbody>
</table>

<h2>🏆 LEADERBOARD</h2>

<table>
<thead>
<tr>
<th>#</th>
<th>Team</th>
<th>Total Points</th>
</tr>
</thead>
<tbody id="board"></tbody>
</table>

<script>

// 25 TEAM AUTO
let teams = Array.from({length:25}, (_,i)=>"TEAM "+(i+1));

// DATA STORAGE
let data = JSON.parse(localStorage.getItem("scrim")) || [];

// TEAM SELECT
let select = document.getElementById("team");
teams.forEach(t=>{
  let opt = document.createElement("option");
  opt.textContent = t;
  select.appendChild(opt);
});

// POINT SYSTEM
function calc(rank,kills){
  let p=0;
  if(rank==1) p=15;
  else if(rank==2) p=12;
  else if(rank==3) p=10;
  else if(rank<=5) p=8;
  else if(rank<=10) p=4;
  else if(rank<=15) p=2;
  return p+kills;
}

// ADD MATCH
function add(){
  let team=document.getElementById("team").value;
  let rank=parseInt(document.getElementById("rank").value);
  let kill=parseInt(document.getElementById("kill").value);
  let match=data.length+1;

  data.push({
    team,
    rank,
    kill,
    match,
    point:calc(rank,kill)
  });

  save();
  render();
}

// DELETE
function del(i){
  data.splice(i,1);
  save();
  render();
}

// RESET
function resetAll(){
  if(confirm("Reset all data?")){
    data=[];
    save();
    render();
  }
}

// SAVE LOCAL
function save(){
  localStorage.setItem("scrim",JSON.stringify(data));
}

// MATCH TABLE
function render(){
  let html="";

  data.forEach((d,i)=>{
    html+=`
      <tr>
        <td>${d.team}</td>
        <td>${d.match}</td>
        <td>${d.rank}</td>
        <td>${d.kill}</td>
        <td>${d.point}</td>
        <td><button onclick="del(${i})">X</button></td>
      </tr>
    `;
  });

  document.getElementById("list").innerHTML=html;

  board();
}

// 🔥 FIXED LEADERBOARD (SORTED)
function board(){
  let totals={};

  data.forEach(d=>{
    totals[d.team]=(totals[d.team]||0)+d.point;
  });

  let sorted=Object.entries(totals).sort((a,b)=>b[1]-a[1]);

  let html="";

  sorted.forEach((t,i)=>{
    html+=`
      <tr>
        <td>${i+1}</td>
        <td>${t[0]}</td>
        <td>${t[1]}</td>
      </tr>
    `;
  });

  document.getElementById("board").innerHTML=html;
}

// WHATSAPP RESULT
function sendWhatsApp(){
  let text="🔥 SCRIM RESULT%0A";

  let totals={};

  data.forEach(d=>{
    totals[d.team]=(totals[d.team]||0)+d.point;
  });

  let sorted=Object.entries(totals).sort((a,b)=>b[1]-a[1]);

  sorted.forEach((t,i)=>{
    text+=`${i+1}. ${t[0]} - ${t[1]} pts%0A`;
  });

  window.open("https://wa.me/?text="+text,"_blank");
}

render();

</script>

</body>
</html>
