<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>20msVIP SCRIM SYSTEM</title>

<style>
body { background:#050505; color:#fff; font-family:'Arial Black'; text-align:center; padding:20px; }
.container { background:#111; padding:25px; border-radius:15px; display:inline-block; border:2px solid #00ffcc; }

input,button,select {
padding:10px;
margin:5px;
border-radius:8px;
border:none;
font-weight:900;
}

input { background:#1a1a1a; color:#fff; width:80px; }

button { cursor:pointer; }

.calcBtn { background:#00ffcc; color:#000; }
.reset { background:#ff3e3e; color:#fff; }

table {
width:95%;
margin:25px auto;
border-collapse:collapse;
}

th,td {
border:1px solid #222;
padding:10px;
}

th {
background:#00ffcc;
color:#000;
}
</style>
</head>

<body>

<h1>🔥 20msVIP MATCH PANEL 🔥</h1>

<div class="container">

<input id="team" placeholder="TEAM">
<input id="rank" type="number" placeholder="RANK">

<br>

<input id="p1" type="number" placeholder="P1">
<input id="p2" type="number" placeholder="P2">
<input id="p3" type="number" placeholder="P3">
<input id="p4" type="number" placeholder="P4">

<br>

<select id="matchNo">
<option value="1">MATCH 1</option>
<option value="2">MATCH 2</option>
<option value="3">MATCH 3</option>
<option value="4">MATCH 4</option>
</select>

<br>

<button onclick="add()">EKLE</button>
<button class="reset" onclick="resetAll()">SIFIRLA</button>

<br><br>

<button class="calcBtn" onclick="calculate(1)">1 MAÇ</button>
<button class="calcBtn" onclick="calculate(2)">2 MAÇ</button>
<button class="calcBtn" onclick="calculate(3)">3 MAÇ</button>
<button class="calcBtn" onclick="calculate(4)">4 MAÇ</button>

</div>

<table>
<thead>
<tr>
<th>#</th>
<th>TEAM</th>
<th>KILL</th>
<th>RANK</th>
<th>TOTAL</th>
</tr>
</thead>
<tbody id="board"></tbody>
</table>

<script>

let data = [];

// 🔥 PUBG PUAN SİSTEMİ
function getRankPoint(rank){
if(rank==1) return 15;
if(rank==2) return 12;
if(rank==3) return 10;
if(rank==4) return 8;
if(rank==5) return 6;
if(rank==6) return 4;
if(rank==7) return 2;
if(rank>=8 && rank<=12) return 1;
return 0;
}

// 🔥 EKLE
function add(){

let t = team.value.trim();
let r = parseInt(rank.value);
let match = Number(matchNo.value);

// 🔥 TÜM BOŞLAR = 0
let p1v = Number(p1.value) || 0;
let p2v = Number(p2.value) || 0;
let p3v = Number(p3.value) || 0;
let p4v = Number(p4.value) || 0;

let kill = p1v + p2v + p3v + p4v;

// ❗ SADECE RANK ZORUNLU
if(isNaN(r)){
alert("Sıralama boş olamaz!");
return;
}

// takım boşsa otomatik isim
if(!t){
t = "TEAM_" + Math.floor(Math.random()*1000);
}

data.push({
name: t.toUpperCase(),
rank: r,
kill: kill,
match: match
});

// temizle
team.value="";
rank.value="";
p1.value="";
p2.value="";
p3.value="";
p4.value="";
}

// 🔥 HESAPLA
function calculate(matchLimit){

let stats = {};

data.forEach(d=>{

if(d.match > matchLimit) return;

let rp = getRankPoint(d.rank);

if(!stats[d.name]) stats[d.name]={k:0,r:0,t:0};

stats[d.name].k += d.kill;
stats[d.name].r += rp;
stats[d.name].t += (d.kill + rp);
});

// sırala
let sorted = Object.entries(stats).sort((a,b)=>b[1].t - a[1].t);

// yazdır
let html = "";

sorted.forEach((x,i)=>{
html += `
<tr>
<td>${i+1}</td>
<td>${x[0]}</td>
<td>${x[1].k}</td>
<td>${x[1].r}</td>
<td>${x[1].t}</td>
</tr>`;
});

board.innerHTML = html;
}

// 🔥 RESET
function resetAll(){
data = [];
board.innerHTML = "";
}

</script>

</body>
</html>
