<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>20msVIP SCRIM SYSTEM PRO</title>

<style>
body{background:#050505;color:#fff;font-family:'Arial Black';text-align:center;padding:20px;}
.container{background:#111;padding:25px;border-radius:15px;display:inline-block;border:2px solid #00ffcc;}
input{padding:8px;margin:4px;border-radius:8px;border:none;background:#1a1a1a;color:#fff;width:70px;}
button{padding:10px;margin:5px;border:none;border-radius:8px;font-weight:900;cursor:pointer;}

.add{background:#00ffcc;color:#000;}
.reset{background:#ff3e3e;color:#fff;}
.wa{background:#25D366;color:#fff;width:100%;}
.export{background:#00acee;color:#fff;width:100%;}

table{width:95%;margin:25px auto;border-collapse:collapse;}
th,td{border:1px solid #222;padding:10px;}
th{background:#00ffcc;color:#000;}

.match{border:1px solid #333;margin:10px;padding:10px;}
</style>
</head>

<body>

<h1>🔥 20msVIP RESULT PANEL 🔥</h1>

<div class="container">

<input id="team" placeholder="TEAM">

<!-- MATCHLER -->
<div class="match">Match 1<br>
<input id="r1" placeholder="Rank">
<input id="m1p1" placeholder="P1">
<input id="m1p2" placeholder="P2">
<input id="m1p3" placeholder="P3">
<input id="m1p4" placeholder="P4">
</div>

<div class="match">Match 2<br>
<input id="r2" placeholder="Rank">
<input id="m2p1" placeholder="P1">
<input id="m2p2" placeholder="P2">
<input id="m2p3" placeholder="P3">
<input id="m2p4" placeholder="P4">
</div>

<div class="match">Match 3<br>
<input id="r3" placeholder="Rank">
<input id="m3p1" placeholder="P1">
<input id="m3p2" placeholder="P2">
<input id="m3p3" placeholder="P3">
<input id="m3p4" placeholder="P4">
</div>

<div class="match">Match 4<br>
<input id="r4" placeholder="Rank">
<input id="m4p1" placeholder="P1">
<input id="m4p2" placeholder="P2">
<input id="m4p3" placeholder="P3">
<input id="m4p4" placeholder="P4">
</div>

<button class="add" onclick="add()">EKLE</button>
<button class="reset" onclick="resetAll()">SIFIRLA</button>
<button class="wa" onclick="sendWhatsApp()">WHATSAPP</button>
<button class="export" onclick="exportImage()">PNG</button>

</div>

<table>
<thead>
<tr>
<th>#</th><th>TEAM</th><th>WWNC</th><th>KILL</th><th>RANK</th><th>TOTAL</th>
</tr>
</thead>
<tbody id="board"></tbody>
</table>

<canvas id="canvas" width="1920" height="1080" style="display:none;"></canvas>

<script>

let data=[];

// PUBG PUAN
function rp(r){
if(r==1)return 15;
if(r==2)return 12;
if(r==3)return 10;
if(r==4)return 8;
if(r==5)return 6;
if(r==6)return 4;
if(r==7)return 2;
if(r>=8&&r<=12)return 1;
return 0;
}

// EKLE
function add(){

let name = team.value.trim();
if(!name) return alert("Takım gir!");

let totalKill=0;
let totalRank=0;
let wins=0;

for(let i=1;i<=4;i++){

let rInput=document.getElementById("r"+i).value;

// boşsa geç
if(rInput==="") continue;

let r=Number(rInput);

// playerlar
let p1=Number(document.getElementById("m"+i+"p1").value)||0;
let p2=Number(document.getElementById("m"+i+"p2").value)||0;
let p3=Number(document.getElementById("m"+i+"p3").value)||0;
let p4=Number(document.getElementById("m"+i+"p4").value)||0;

let kill=p1+p2+p3+p4;

totalKill+=kill;
totalRank+=rp(r);

if(r==1) wins++;
}

let total=totalKill+totalRank;

data.push({
name:name.toUpperCase(),
k:totalKill,
r:totalRank,
t:total,
w:wins
});

render();

// temizle
document.querySelectorAll("input").forEach(i=>i.value="");
}

// RENDER
function render(){

let sorted=[...data].sort((a,b)=>b.t-a.t);

let html="";

sorted.forEach((x,i)=>{
html+=`
<tr>
<td>${i+1}</td>
<td>${x.name}</td>
<td>${x.w>0?"x"+x.w:"-"}</td>
<td>${x.k}</td>
<td>${x.r}</td>
<td>${x.t}</td>
</tr>`;
});

board.innerHTML=html;
}

// WHATSAPP
function sendWhatsApp(){

let sorted=[...data].sort((a,b)=>b.t-a.t);

let msg="20msVIP DAILY RESULT\n\n";

sorted.forEach((x,i)=>{

let w=x.w>0?"WWNC: x"+x.w+"\n":"";

msg+=`${i+1}. ${x.name}\n`;
msg+=w;
msg+=`Kill: ${x.k}\n`;
msg+=`Rank: ${x.r}\n`;
msg+=`Total: ${x.t}\n\n`;
});

window.open("https://wa.me/?text="+encodeURIComponent(msg));
}

// RESET
function resetAll(){
data=[];
board.innerHTML="";
}

// PNG
function exportImage(){

let c=canvas;
let ctx=c.getContext("2d");

ctx.fillStyle="#000";
ctx.fillRect(0,0,1920,1080);

let sorted=[...data].sort((a,b)=>b.t-a.t);

ctx.fillStyle="#fff";
ctx.font="30px Arial";

let y=100;

sorted.forEach((x,i)=>{

ctx.fillText(`${i+1}. ${x.name} - ${x.t}`,100,y);
y+=40;

});

let link=document.createElement("a");
link.download="result.png";
link.href=c.toDataURL();
link.click();
}

</script>

</body>
</html>
