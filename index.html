<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>20msVIP SCRIM SYSTEM PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

<style>
:root{
  --neon:#00ffd0;
  --gold:#ffcc00;
}

body{
  background: radial-gradient(circle at top,#0a0a0a,#000);
  color:#fff;
  font-family:'Rajdhani',sans-serif;
  text-align:center;
  padding:20px;
}

/* Başlık */
h1{
  font-family:'Orbitron';
  color:var(--gold);
  text-shadow:0 0 12px rgba(255,204,0,.8);
}

/* Panel */
.container{
  background:rgba(15,15,15,0.8);
  backdrop-filter:blur(12px);
  padding:25px;
  border-radius:18px;
  border:1px solid rgba(0,255,208,.3);
  box-shadow:0 0 25px rgba(0,255,208,.15);
  display:inline-block;
}

/* Input */
input{
  padding:8px;
  margin:4px;
  border-radius:10px;
  border:1px solid #222;
  background:#111;
  color:#fff;
  width:70px;
}
input:focus{
  border:1px solid var(--neon);
  box-shadow:0 0 10px var(--neon);
}

/* Match */
.match{
  border:1px solid #222;
  margin:10px;
  padding:10px;
  border-radius:12px;
  background:#111;
}

/* Buton */
button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
}

.add{background:var(--neon);color:#000;}
.reset{background:red;color:#fff;}
.wa{background:#25D366;width:100%;}
.export{background:#00acee;width:100%;}

/* Tablo */
table{
  width:95%;
  margin:25px auto;
  border-collapse:collapse;
}

th{
  background:var(--neon);
  color:#000;
}

td{
  border-bottom:1px solid #222;
  padding:10px;
}

/* 1. sıra */
tr:first-child{
  background:#2a2000;
  color:var(--gold);
  font-weight:900;
}
</style>
</head>

<body>

<h1>🔥 20msVIP RESULT PANEL 🔥</h1>

<div class="container">

<input id="team" placeholder="TEAM">

<div class="match">Match 1<br>
<input id="r1" placeholder="Rank">
<input id="m1p1" placeholder="P1">
<input id="m1p2" placeholder="P2">
<input id="m1p3" placeholder="P3">
<input id="m1p4" placeholder="P4">
</div>

<div class="match">Match 2<br>
<input id="r2" placeholder="Rank">
<input id="m2p1" placeholder="P1">
<input id="m2p2" placeholder="P2">
<input id="m2p3" placeholder="P3">
<input id="m2p4" placeholder="P4">
</div>

<div class="match">Match 3<br>
<input id="r3" placeholder="Rank">
<input id="m3p1" placeholder="P1">
<input id="m3p2" placeholder="P2">
<input id="m3p3" placeholder="P3">
<input id="m3p4" placeholder="P4">
</div>

<div class="match">Match 4<br>
<input id="r4" placeholder="Rank">
<input id="m4p1" placeholder="P1">
<input id="m4p2" placeholder="P2">
<input id="m4p3" placeholder="P3">
<input id="m4p4" placeholder="P4">
</div>

<button class="add" onclick="add()">EKLE</button>
<button class="reset" onclick="resetAll()">SIFIRLA</button>
<button class="wa" onclick="sendWhatsApp()">WHATSAPP</button>
<button class="export" onclick="exportImage()">PNG</button>

</div>

<table>
<thead>
<tr>
<th>#</th><th>TEAM</th><th>WWNC</th><th>KILL</th><th>RANK</th><th>TOTAL</th>
</tr>
</thead>
<tbody id="board"></tbody>
</table>

<canvas id="canvas" width="1920" height="1080" style="display:none;"></canvas>

<script>

let data = JSON.parse(localStorage.getItem("scrimData")) || [];

// PUAN SİSTEMİ
function rp(r){
if(r==1)return 10;
if(r==2)return 6;
if(r==3)return 5;
if(r==4)return 4;
if(r==5)return 3;
if(r==6)return 2;
if(r==7)return 1;
if(r==8)return 1;
return 0;
}

// EKLE
function add(){

let name = team.value.trim();
if(!name) return alert("Takım gir!");

let totalKill=0;
let totalRank=0;
let wins=0;

for(let i=1;i<=4;i++){

let rInput=document.getElementById("r"+i).value;
if(rInput==="") continue;

let r=Number(rInput);

let p1=Number(document.getElementById("m"+i+"p1").value)||0;
let p2=Number(document.getElementById("m"+i+"p2").value)||0;
let p3=Number(document.getElementById("m"+i+"p3").value)||0;
let p4=Number(document.getElementById("m"+i+"p4").value)||0;

let kill=p1+p2+p3+p4;

totalKill+=kill;
totalRank+=rp(r);

if(r==1) wins++;
}

let total=totalKill+totalRank;

data.push({
name:name.toUpperCase(),
k:totalKill,
r:totalRank,
t:total,
w:wins
});

localStorage.setItem("scrimData", JSON.stringify(data));

render();

document.querySelectorAll("input").forEach(i=>i.value="");
}

// RENDER
function render(){

let sorted=[...data].sort((a,b)=>b.t-a.t);

let html="";

sorted.forEach((x,i)=>{
html+=`
<tr>
<td>${i+1}</td>
<td>${x.name}</td>
<td>${x.w>0?"x"+x.w:"-"}</td>
<td>${x.k}</td>
<td>${x.r}</td>
<td>${x.t}</td>
</tr>`;
});

board.innerHTML=html;
}

// WHATSAPP
function sendWhatsApp(){

let sorted=[...data].sort((a,b)=>b.t-a.t);

let msg="20msVIP DAILY RESULT\n\n";

sorted.forEach((x,i)=>{
let w=x.w>0?"WWNC: x"+x.w+"\n":"";

msg+=`${i+1}. ${x.name}\n`;
msg+=w;
msg+=`Kill: ${x.k}\n`;
msg+=`Rank: ${x.r}\n`;
msg+=`Total: ${x.t}\n\n`;
});

window.open("https://wa.me/?text="+encodeURIComponent(msg));
}

// RESET
function resetAll(){
data=[];
localStorage.removeItem("scrimData");
board.innerHTML="";
}

// PNG
function exportImage(){

let c=canvas;
let ctx=c.getContext("2d");

ctx.fillStyle="#000";
ctx.fillRect(0,0,1920,1080);

let sorted=[...data].sort((a,b)=>b.t-a.t);

ctx.fillStyle="#fff";
ctx.font="30px Arial";

let y=100;

sorted.forEach((x,i)=>{
ctx.fillText(`${i+1}. ${x.name} - ${x.t}`,100,y);
y+=40;
});

let link=document.createElement("a");
link.download="result.png";
link.href=c.toDataURL();
link.click();
}

render();

</script>

</body>
</html>
