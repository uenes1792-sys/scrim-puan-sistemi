<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>20msVIP SCRIM SYSTEM - Full Hizalama</title>
    <style>
        body {
            background: #000;
            color: white;
            font-family: 'Arial', sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 { color: #00ffcc; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        .panel { background: #111; padding: 25px; border-radius: 12px; display: inline-block; border: 1px solid #333; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        input, button { padding: 12px; margin: 5px; border-radius: 6px; border: none; font-weight: bold; font-size: 14px; }
        input { background: #222; color: white; width: 150px; border: 1px solid #444; }
        input:focus { outline: 2px solid #00ffcc; border-color: transparent; }
        button { cursor: pointer; transition: all 0.2s ease; text-transform: uppercase; letter-spacing: 1px; }
        .add-btn { background: #00ffcc; color: #000; }
        .reset-btn { background: #ff4d4d; color: #fff; }
        .wa-btn { background: #25D366; color: #fff; }
        .export-btn { background: #00acee; color: #fff; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }

        table {
            width: 95%;
            margin: 25px auto;
            border-collapse: collapse;
            background: #111;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 8px;
            overflow: hidden;
        }
        th, td { border: 1px solid #222; padding: 12px; text-align: center; font-size: 14px; }
        th { background: #1a1a1a; color: #00ffcc; font-weight: 600; text-transform: uppercase; }
        tr:nth-child(even) { background: #171717; }
        tr:hover { background: #222; }
    </style>
</head>
<body>

    <h1>🔥 20msVIP SCRIM PANEL</h1>

    <div class="panel">
        <input id="team" placeholder="Takım Adı">
        <input id="rank" type="number" placeholder="Sıralama (1, 2, 3...)">
        <input id="kill" type="number" placeholder="Toplam Kill">
        <br>
        <button class="add-btn" onclick="add()">Ekle</button>
        <button class="reset-btn" onclick="resetAll()">Sıfırla</button>
        <button class="wa-btn" onclick="sendWhatsApp()">WhatsApp Mesajı</button>
        <button class="export-btn" onclick="exportImage()">📸 PNG OLARAK KAYDET</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Takım</th>
                <th>WWNC</th>
                <th>Kill</th>
                <th>Sıra Puanı</th>
                <th>Toplam</th>
            </tr>
        </thead>
        <tbody id="board"></tbody>
    </table>

    <canvas id="canvas" width="1920" height="1080" style="display:none;"></canvas>

<script>
    let data = JSON.parse(localStorage.getItem("scrim_data_v4")) || [];

    function calc(rank, kill) {
        let p = 0;
        if (rank == 1) p = 15;
        else if (rank == 2) p = 12;
        else if (rank == 3) p = 10;
        else if (rank <= 5) p = 8;
        else if (rank <= 10) p = 4;
        else if (rank <= 15) p = 2;
        return p + kill;
    }

    function add() {
        let t = document.getElementById("team");
        let r = document.getElementById("rank");
        let k = document.getElementById("kill");

        let team = t.value.trim();
        let rank = parseInt(r.value);
        let kill = parseInt(k.value);

        if (!team || isNaN(rank) || isNaN(kill)) {
            alert("Lütfen tüm alanları doldurun!");
            return;
        }

        data.push({ team, rank, kill, point: calc(rank, kill) });
        save();
        render();

        t.value = ""; r.value = ""; k.value = "";
        t.focus();
    }

    function save() { localStorage.setItem("scrim_data_v4", JSON.stringify(data)); }

    function resetAll() {
        if (confirm("Veriler sıfırlansın mı?")) {
            data = [];
            save();
            render();
        }
    }

    function getBoard() {
        let t = {}, k = {}, r = {}, w = {};
        data.forEach(d => {
            t[d.team] = (t[d.team] || 0) + d.point;
            k[d.team] = (k[d.team] || 0) + d.kill;
            r[d.team] = (r[d.team] || 0) + (d.point - d.kill);
            if (d.rank == 1) w[d.team] = (w[d.team] || 0) + 1;
        });

        return Object.entries(t)
            .sort((a, b) => b[1] - a[1]) // Toplam puana göre sırala
            .map((x, i) => ({
                pos: i + 1,
                team: x[0],
                total: x[1],
                kill: k[x[0]] || 0,
                rank: r[x[0]] || 0,
                win: w[x[0]] || 0
            }));
    }

    function render() {
        let arr = getBoard();
        let html = "";
        arr.forEach(d => {
            html += `<tr><td>${d.pos}</td><td>${d.team}</td><td>${d.win ? "x" + d.win : "-"}</td><td>${d.kill}</td><td>${d.rank}</td><td>${d.total}</td></tr>`;
        });
        document.getElementById("board").innerHTML = html;
    }

    function sendWhatsApp() {
        let arr = getBoard();
        let text = "🔥 *20msVIP RESULT*%0A%0A";
        arr.forEach(d => {
            text += `*${d.pos}.* ${d.team} | Total: ${d.total} | Kill: ${d.kill}%0A`;
        });
        window.open("https://wa.me/?text=" + text, "_blank");
    }

    function exportImage() {
        let canvas = document.getElementById("canvas");
        let ctx = canvas.getContext("2d");
        let bg = new Image();
        
        // Dosya ismi orijinaliyle aynı kalmalı
        bg.src = "IMG-20260423-WA0006.jpg"; 

        bg.onload = function() {
            // Görseli yatay (1920x1080) çiziyoruz
            ctx.clearRect(0, 0, 1920, 1080);
            ctx.drawImage(bg, 0, 0, 1920, 1080);

            let arr = getBoard();

            // YAZI AYARLARI VE NETLİK
            ctx.fillStyle = "#ffffff";
            ctx.font = "bold 26px Arial, sans-serif"; // Daha kalın ve net font
            ctx.textAlign = "center"; // Tüm sütunlar için ortalama
            ctx.textBaseline = "middle"; // Satırları tam ortala

            // Başlangıç koordinatları (image_3.png'ye göre milimetrik)
            let startY = 328;   // İlk takımın (Rank 1/Rank 14) Y koordinatı
            let rowHeight = 49; // Satırlar arası boşluk

            // SOL TABLO (1-13)
            arr.slice(0, 13).forEach((d, i) => {
                let y = startY + (i * rowHeight);
                
                // Koordinatlar sütunların tam orta noktalarıdır
                ctx.fillText(d.team, 178, y);              // TEAM NAME
                ctx.fillText(d.win ? "x"+d.win : "-", 298, y); // WWNC
                ctx.fillText(d.kill, 395, y);              // KILL POINTS
                ctx.fillText(d.rank, 502, y);              // RANK POINTS
                ctx.fillText(d.total, 615, y);             // TOTAL POINTS
            });

            // SAĞ TABLO (14-25)
            arr.slice(13, 25).forEach((d, i) => {
                let y = startY + (i * rowHeight);
                
                // Sağ tarafın koordinatları
                ctx.fillText(d.team, 742, y);              // TEAM NAME
                ctx.fillText(d.win ? "x"+d.win : "-", 862, y); // WWNC
                ctx.fillText(d.kill, 959, y);              // KILL POINTS
                ctx.fillText(d.rank, 1066, y);             // RANK POINTS
                ctx.fillText(d.total, 1179, y);            // TOTAL POINTS
            });

            // Resmi İndir
            let link = document.createElement("a");
            link.download = "20msVIP_Günün_Sonucu.png";
            link.href = canvas.toDataURL("image/png", 1.0);
            link.click();
        };
    }

    render();
</script>

</body>
</html>
