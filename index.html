<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>20msVIP SCRIM SYSTEM - PRO V7</title>
    <style>
        body { background: #050505; color: #fff; font-family: 'Arial Black', Gadget, sans-serif; text-align: center; padding: 20px; }
        .container { background: #111; padding: 25px; border-radius: 15px; display: inline-block; border: 2px solid #00ffcc; box-shadow: 0 0 25px #00ffcc33; }
        input, button { padding: 12px; margin: 5px; border-radius: 8px; border: none; font-weight: 900; }
        input { background: #1a1a1a; color: #fff; width: 140px; border: 1px solid #333; }
        button { cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .add { background: #00ffcc; color: #000; }
        .reset { background: #ff3e3e; color: #fff; }
        .export { background: #00acee; color: #fff; width: 100%; margin-top: 10px; font-size: 18px; }
        .wa { background: #25D366; color: #fff; width: 100%; margin-top: 5px; font-size: 16px; }
        table { width: 95%; margin: 25px auto; border-collapse: collapse; background: #111; border: 1px solid #333; }
        th, td { border: 1px solid #222; padding: 12px; text-align: center; }
        th { background: #00ffcc; color: #000; font-size: 14px; }
        tr:nth-child(even) { background: #161616; }
    </style>
</head>
<body>

    <h1 style="color:#00ffcc; letter-spacing: 2px;">🔥 20msVIP RESULT PANEL 🔥</h1>

    <div class="container">
        <input id="team" placeholder="TAKIM ADI">
        <input id="rank" type="number" placeholder="SIRA">
        <input id="kill" type="number" placeholder="KILL">
        <br>
        <button class="add" onclick="add()">TAKIM EKLE</button>
        <button class="reset" onclick="resetAll()">SIFIRLA</button>
        <button class="wa" onclick="sendWhatsApp()">📱 WHATSAPP İLE GÖNDER</button>
        <button class="export" onclick="exportImage()">📸 GÖRSELİ OLUŞTUR (YATAY PNG)</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>#</th><th>TAKIM</th><th>WWNC</th><th>KILL</th><th>RANK P.</th><th>TOPLAM</th>
            </tr>
        </thead>
        <tbody id="board"></tbody>
    </table>

    <canvas id="canvas" width="1920" height="1080" style="display:none;"></canvas>

<script>
    let scrimData = JSON.parse(localStorage.getItem("20ms_v7")) || [];

    function calc(rank, kill) {
        let rp = 0;
        if (rank == 1) rp = 15;
        else if (rank == 2) rp = 12;
        else if (rank == 3) rp = 10;
        else if (rank <= 5) rp = 8;
        else if (rank <= 10) rp = 4;
        else if (rank <= 15) rp = 2;
        return { total: rp + kill, rankP: rp };
    }

    function add() {
        const t = document.getElementById("team"), r = document.getElementById("rank"), k = document.getElementById("kill");
        if (!t.value || isNaN(r.value) || isNaN(k.value)) return alert("Lütfen tüm alanları doldurun!");
        
        const res = calc(parseInt(r.value), parseInt(k.value));
        scrimData.push({ 
            name: t.value.toUpperCase(), 
            rank: parseInt(r.value), 
            kill: parseInt(k.value), 
            rankP: res.rankP, 
            total: res.total 
        });
        localStorage.setItem("20ms_v7", JSON.stringify(scrimData));
        render();
        t.value = ""; r.value = ""; k.value = ""; t.focus();
    }

    function getProcessedData() {
        let stats = {};
        scrimData.forEach(d => {
            if(!stats[d.name]) stats[d.name] = { total:0, kills:0, rp:0, wins:0 };
            stats[d.name].total += d.total;
            stats[d.name].kills += d.kill;
            stats[d.name].rp += d.rankP;
            if(d.rank == 1) stats[d.name].wins += 1;
        });
        return Object.entries(stats).sort((a,b) => b[1].total - a[1].total);
    }

    function render() {
        const sorted = getProcessedData();
        let html = "";
        sorted.forEach((item, i) => {
            html += `<tr><td>${i+1}</td><td><b>${item[0]}</b></td><td>${item[1].wins || '-'}</td><td>${item[1].kills}</td><td>${item[1].rp}</td><td><b>${item[1].total}</b></td></tr>`;
        });
        document.getElementById("board").innerHTML = html;
    }

    function sendWhatsApp() {
        const list = getProcessedData();
        if (list.length === 0) return alert("Veri bulunamadı!");

        let msg = "🏆 *20msVIP ORGANIZATION DAILY RESULT* 🏆%0A%0A";
        
        list.forEach((item, i) => {
            msg += `*${i+1}. ${item[0]}* ${item[1].wins > 0 ? "🏆x"+item[1].wins : ""}%0A`;
            msg += `└ Kill: *${item[1].kills}* | Rank P: *${item[1].rp}*%0A`;
            msg += `└ *TOTAL: ${item[1].total} PUAN*%0A%0A`;
        });

        window.open(`https://wa.me/?text=${msg}`, "_blank");
    }

    function resetAll() { if(confirm("Tüm veriler silinsin mi?")) { scrimData=[]; localStorage.removeItem("20ms_v7"); render(); } }

    function exportImage() {
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const bg = new Image();
        bg.src = "IMG-20260423-WA0006.jpg";

        bg.onload = function() {
            ctx.drawImage(bg, 0, 0, 1920, 1080);
            const list = getProcessedData();

            ctx.fillStyle = "white";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            
            const startY = 328; 
            const rowH = 49.35; 

            list.forEach((item, i) => {
                if (i >= 25) return; 
                
                const d = { name: item[0], wins: item[1].wins, kill: item[1].kills, rp: item[1].rp, total: item[1].total };
                const isLeft = i < 13;
                const index = isLeft ? i : i - 13;
                const y = startY + (index * rowH);

                // Sütunların merkez X koordinatları
                const colX = isLeft ? 
                    { name: 185, wwnc: 308, kill: 408, rank: 512, total: 625 } : 
                    { name: 755, wwnc: 878, kill: 978, rank: 1082, total: 1195 };

                // Takım İsmi (Otomatik Font Küçültme ve Kalın Font)
                let fontSize = 28;
                ctx.font = "900 " + fontSize + "px Arial Black, sans-serif";
                while (ctx.measureText(d.name).width > 185 && fontSize > 16) {
                    fontSize--;
                    ctx.font = "900 " + fontSize + "px Arial Black, sans-serif";
                }
                ctx.fillText(d.name, colX.name, y);
                
                // İstatistikler (Daha Büyük ve Kalın)
                ctx.font = "900 29px Arial Black, sans-serif";
                ctx.fillText(d.wins > 0 ? "x"+d.wins : "-", colX.wwnc, y);
                ctx.fillText(d.kill, colX.kill, y);
                ctx.fillText(d.rp, colX.rank, y);
                ctx.fillText(d.total, colX.total, y);
            });

            const link = document.createElement("a");
            link.download = "20msVIP_Official_Result.png";
            link.href = canvas.toDataURL("image/png", 1.0);
            link.click();
        };
    }
    render();
</script>
</body>
</html>
