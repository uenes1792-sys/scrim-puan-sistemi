<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>20msVIP SCRIM SYSTEM</title>

<style>
body{
  background:#000;
  color:white;
  font-family:Arial;
  text-align:center;
}

h1{
  color:#00ffcc;
}

input,button{
  padding:10px;
  margin:5px;
}

table{
  width:95%;
  margin:auto;
  margin-top:20px;
  border-collapse:collapse;
}

th,td{
  border:1px solid #333;
  padding:6px;
}

th{
  background:#00ffcc;
  color:black;
}
</style>
</head>

<body>

<h1>🔥 20msVIP SCRIM PANEL</h1>

<input id="team" placeholder="Team Name">
<input id="rank" placeholder="Rank">
<input id="kill" placeholder="Kills">

<br>

<button onclick="add()">ADD</button>
<button onclick="resetAll()">RESET</button>
<button onclick="sendWhatsApp()">WHATSAPP</button>
<button onclick="exportImage()">📸 EXPORT PNG</button>

<table>
<thead>
<tr>
<th>#</th>
<th>Team</th>
<th>WWNC</th>
<th>Kill</th>
<th>Rank</th>
<th>Total</th>
</tr>
</thead>
<tbody id="board"></tbody>
</table>

<canvas id="canvas" width="1080" height="1920" style="display:none;"></canvas>

<script>

let data = JSON.parse(localStorage.getItem("scrim")) || [];

function calc(rank, kill){
  let p=0;
  if(rank==1)p=15;
  else if(rank==2)p=12;
  else if(rank==3)p=10;
  else if(rank<=5)p=8;
  else if(rank<=10)p=4;
  else if(rank<=15)p=2;
  return p + kill;
}

function add(){
  let teamInput=document.getElementById("team");
  let rankInput=document.getElementById("rank");
  let killInput=document.getElementById("kill");

  let team=teamInput.value.trim();
  let rank=parseInt(rankInput.value);
  let kill=parseInt(killInput.value);

  if(!team || isNaN(rank) || isNaN(kill)){
    alert("Fill all fields!");
    return;
  }

  data.push({team,rank,kill,point:calc(rank,kill)});

  save();
  render();

  teamInput.value="";
  rankInput.value="";
  killInput.value="";
  teamInput.focus();
}

function save(){
  localStorage.setItem("scrim",JSON.stringify(data));
}

function resetAll(){
  if(confirm("Reset all data?")){
    data=[];
    save();
    render();
  }
}

function getBoard(){
  let totals={},kills={},ranks={},wins={};

  data.forEach(d=>{
    totals[d.team]=(totals[d.team]||0)+d.point;
    kills[d.team]=(kills[d.team]||0)+d.kill;
    ranks[d.team]=(ranks[d.team]||0)+(d.point-d.kill);

    if(d.rank==1){
      wins[d.team]=(wins[d.team]||0)+1;
    }
  });

  return Object.entries(totals)
    .sort((a,b)=>b[1]-a[1])
    .map((x,i)=>({
      pos:i+1,
      team:x[0],
      total:x[1],
      kill:kills[x[0]]||0,
      rank:ranks[x[0]]||0,
      win:wins[x[0]]||0
    }));
}

function render(){
  let arr=getBoard();
  let html="";

  arr.forEach(d=>{
    html+=`
    <tr>
      <td>${d.pos}</td>
      <td>${d.team}</td>
      <td>${d.win?"x"+d.win:"-"}</td>
      <td>${d.kill}</td>
      <td>${d.rank}</td>
      <td>${d.total}</td>
    </tr>`;
  });

  document.getElementById("board").innerHTML=html;
}

function sendWhatsApp(){
  let arr=getBoard();
  let text="🔥 20msVIP RESULT%0A%0A";

  arr.forEach(d=>{
    text+=`${d.pos}. ${d.team} ${d.win?"x"+d.win:""}%0A`;
    text+=`Kill: ${d.kill}%0A`;
    text+=`Rank: ${d.rank}%0A`;
    text+=`Total: ${d.total}%0A%0A`;
  });

  window.open("https://wa.me/?text="+text,"_blank");
}

function exportImage(){

  let canvas=document.getElementById("canvas");
  let ctx=canvas.getContext("2d");

  let bg=new Image();
  bg.src="bg.png";

  bg.onload=function(){

    ctx.clearRect(0,0,1080,1920);
    ctx.drawImage(bg,0,0,1080,1920);

    let arr=getBoard();

    ctx.fillStyle="#ffffff";
    ctx.font="26px Arial";

    let startY=500;

    // 🔥 SOL TARAF (1-13)
    arr.slice(0,13).forEach((d,i)=>{
      let y=startY+(i*60);

      ctx.fillText(d.pos,80,y);
      ctx.fillText(d.team,150,y);
      ctx.fillText(d.win?"x"+d.win:"-",420,y);
      ctx.fillText(d.kill,520,y);
      ctx.fillText(d.rank,620,y);
      ctx.fillText(d.total,720,y);
    });

    // 🔥 SAĞ TARAF (14-25)
    arr.slice(13,25).forEach((d,i)=>{
      let y=startY+(i*60);

      ctx.fillText(d.pos,760,y);
      ctx.fillText(d.team,830,y);
      ctx.fillText(d.win?"x"+d.win:"-",1100,y);
      ctx.fillText(d.kill,1200,y);
      ctx.fillText(d.rank,1300,y);
      ctx.fillText(d.total,1400,y);
    });

    let link=document.createElement("a");
    link.download="result.png";
    link.href=canvas.toDataURL("image/png");
    link.click();
  };

  bg.onerror=function(){
    alert("bg.png bulunamadı!");
  };
}

render();

</script>

</body>
</html>
