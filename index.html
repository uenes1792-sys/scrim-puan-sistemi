<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>20msVIP SCRIM SYSTEM PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

<style>
:root{
  --neon:#00ffd0;
  --gold:#ffcc00;
  --silver:#c0c0c0;
  --bronze:#cd7f32;
}

body{
  background: radial-gradient(circle at top,#0a0a0a,#000);
  color:#fff;
  font-family:'Rajdhani',sans-serif;
  text-align:center;
  padding:20px;
}

h1{
  font-family:'Orbitron';
  color:var(--gold);
}

.container{
  background:rgba(15,15,15,0.8);
  padding:25px;
  border-radius:18px;
  display:inline-block;
}

input{
  padding:8px;
  margin:4px;
  border-radius:10px;
  background:#111;
  color:#fff;
  width:70px;
}

.match{
  border:1px solid #222;
  margin:10px;
  padding:10px;
}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
}

.add{background:var(--neon);color:#000;}
.reset{background:red;color:#fff;}
.wa{background:#25D366;width:100%;}
.export{background:#00acee;width:100%;}

table{
  width:95%;
  margin:25px auto;
  border-collapse:collapse;
}

th{
  background:var(--neon);
  color:#000;
}

td{
  border-bottom:1px solid #222;
  padding:10px;
}

/* MVP */
tr:nth-child(1){color:var(--gold);font-weight:900;}
tr:nth-child(2){color:var(--silver);font-weight:800;}
tr:nth-child(3){color:var(--bronze);font-weight:800;}

</style>
</head>

<body>

<h1>🔥 20msVIP RESULT PANEL 🔥</h1>

<div class="container">

<input id="team" placeholder="TEAM">

<div class="match">Match 1<br>
<input id="r1"><input id="m1p1"><input id="m1p2"><input id="m1p3"><input id="m1p4">
</div>

<div class="match">Match 2<br>
<input id="r2"><input id="m2p1"><input id="m2p2"><input id="m2p3"><input id="m2p4">
</div>

<div class="match">Match 3<br>
<input id="r3"><input id="m3p1"><input id="m3p2"><input id="m3p3"><input id="m3p4">
</div>

<div class="match">Match 4<br>
<input id="r4"><input id="m4p1"><input id="m4p2"><input id="m4p3"><input id="m4p4">
</div>

<div class="match">
<input id="bonus" placeholder="+PUAN">
<input id="penalty" placeholder="-PUAN">
</div>

<button class="add" onclick="add()">EKLE</button>
<button class="reset" onclick="resetAll()">SIFIRLA</button>
<button class="wa" onclick="sendWhatsApp()">WHATSAPP</button>
<button class="export" onclick="exportImage()">PNG</button>

</div>

<table>
<thead>
<tr>
<th>#</th><th>TEAM</th><th>WWNC</th><th>KILL</th><th>RANK</th><th>TOTAL</th>
</tr>
</thead>
<tbody id="board"></tbody>
</table>

<script>

let data = JSON.parse(localStorage.getItem("scrimData")) || [];

function rp(r){
if(r==1)return 10;
if(r==2)return 6;
if(r==3)return 5;
if(r==4)return 4;
if(r==5)return 3;
if(r==6)return 2;
if(r==7)return 1;
if(r==8)return 1;
return 0;
}

function add(){

let name = team.value.trim();
if(!name) return alert("Takım gir!");

// 🔥 FIX
let bonus = Math.abs(Number(bonus.value)) || 0;
let penalty = Math.abs(Number(penalty.value)) || 0;

let totalKill=0;
let totalRank=0;
let wins=0;

for(let i=1;i<=4;i++){
let rInput=document.getElementById("r"+i).value;
if(rInput==="") continue;

let r=Number(rInput);

let kill =
(Number(document.getElementById("m"+i+"p1").value)||0)+
(Number(document.getElementById("m"+i+"p2").value)||0)+
(Number(document.getElementById("m"+i+"p3").value)||0)+
(Number(document.getElementById("m"+i+"p4").value)||0);

totalKill+=kill;
totalRank+=rp(r);

if(r==1) wins++;
}

// 🔥 DOĞRU TOTAL
let total = totalKill + totalRank + bonus - penalty;

data.push({
name:name.toUpperCase(),
k:totalKill,
r:totalRank,
t:total,
w:wins,
b:bonus,
p:penalty
});

localStorage.setItem("scrimData", JSON.stringify(data));
render();
document.querySelectorAll("input").forEach(i=>i.value="");
}

function render(){

let sorted=[...data].sort((a,b)=>b.t-a.t);

let html="";

sorted.forEach((x,i)=>{

let extra="";
if(x.b>0) extra+=" +"+x.b;
if(x.p>0) extra+=" -"+x.p;

html+=`
<tr>
<td>${i+1}</td>
<td>${x.name}</td>
<td>${x.w>0?"x"+x.w:"-"}</td>
<td>${x.k}</td>
<td>${x.r}</td>
<td>${x.t}${extra}</td>
</tr>`;
});

board.innerHTML=html;
}

function sendWhatsApp(){

let sorted=[...data].sort((a,b)=>b.t-a.t);

let msg="20msVIP DAILY RESULT\n\n";

sorted.forEach((x,i)=>{

let mvp = (i<3) ? " (MVP)" : "";

let extra="";
if(x.b>0) extra+=" +"+x.b;
if(x.p>0) extra+=" -"+x.p;

msg+=`${i+1}. ${x.name}${mvp}\n`;
msg+=`Kill: ${x.k}\n`;
msg+=`Rank: ${x.r}\n`;
msg+=`Total: ${x.t}${extra}\n\n`;

});

window.open("https://wa.me/?text="+encodeURIComponent(msg));
}

function resetAll(){
data=[];
localStorage.removeItem("scrimData");
board.innerHTML="";
}

function exportImage(){
let c=canvas;
let ctx=c.getContext("2d");

ctx.fillStyle="#000";
ctx.fillRect(0,0,1920,1080);

let sorted=[...data].sort((a,b)=>b.t-a.t);

ctx.fillStyle="#fff";
ctx.font="30px Arial";

let y=100;

sorted.forEach((x,i)=>{
ctx.fillText(`${i+1}. ${x.name} - ${x.t}`,100,y);
y+=40;
});

let link=document.createElement("a");
link.download="result.png";
link.href=c.toDataURL();
link.click();
}

render();

</script>
</body>
</html>
