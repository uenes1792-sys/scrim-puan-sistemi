<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>20msVIP SCRIM SYSTEM</title>
    <style>
        body {
            background: #000;
            color: white;
            font-family: 'Arial', sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 { color: #00ffcc; margin-bottom: 20px; }
        .panel { background: #111; padding: 20px; border-radius: 10px; display: inline-block; border: 1px solid #333; }
        input, button { padding: 10px; margin: 5px; border-radius: 5px; border: none; font-weight: bold; }
        input { background: #222; color: white; width: 140px; }
        button { cursor: pointer; transition: 0.2s; }
        .add-btn { background: #00ffcc; color: #000; }
        .reset-btn { background: #ff4d4d; color: #fff; }
        .wa-btn { background: #25D366; color: #fff; }
        .export-btn { background: #00acee; color: #fff; }
        button:hover { opacity: 0.8; }

        table {
            width: 95%;
            margin: 20px auto;
            border-collapse: collapse;
            background: #111;
        }
        th, td { border: 1px solid #333; padding: 10px; text-align: center; }
        th { background: #00ffcc; color: black; }
    </style>
</head>
<body>

    <h1>🔥 20msVIP SCRIM PANEL</h1>

    <div class="panel">
        <input id="team" placeholder="Takım Adı">
        <input id="rank" type="number" placeholder="Sıralama">
        <input id="kill" type="number" placeholder="Kill">
        <br>
        <button class="add-btn" onclick="add()">EKLE</button>
        <button class="reset-btn" onclick="resetAll()">SIFIRLA</button>
        <button class="wa-btn" onclick="sendWhatsApp()">WHATSAPP</button>
        <button class="export-btn" onclick="exportImage()">📸 EXPORT PNG</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Takım</th>
                <th>WWNC</th>
                <th>Kill</th>
                <th>Sıra Puanı</th>
                <th>Toplam</th>
            </tr>
        </thead>
        <tbody id="board"></tbody>
    </table>

    <canvas id="canvas" width="1920" height="1080" style="display:none;"></canvas>

<script>
    let data = JSON.parse(localStorage.getItem("scrim_data")) || [];

    function calc(rank, kill) {
        let p = 0;
        if (rank == 1) p = 15;
        else if (rank == 2) p = 12;
        else if (rank == 3) p = 10;
        else if (rank <= 5) p = 8;
        else if (rank <= 10) p = 4;
        else if (rank <= 15) p = 2;
        return p + kill;
    }

    function add() {
        let t = document.getElementById("team");
        let r = document.getElementById("rank");
        let k = document.getElementById("kill");

        let team = t.value.trim();
        let rank = parseInt(r.value);
        let kill = parseInt(k.value);

        if (!team || isNaN(rank) || isNaN(kill)) {
            alert("Lütfen tüm alanları doldurun!");
            return;
        }

        data.push({ team, rank, kill, point: calc(rank, kill) });
        save();
        render();

        t.value = ""; r.value = ""; k.value = "";
        t.focus();
    }

    function save() { localStorage.setItem("scrim_data", JSON.stringify(data)); }

    function resetAll() {
        if (confirm("Veriler sıfırlansın mı?")) {
            data = [];
            save();
            render();
        }
    }

    function getBoard() {
        let t = {}, k = {}, r = {}, w = {};
        data.forEach(d => {
            t[d.team] = (t[d.team] || 0) + d.point;
            k[d.team] = (k[d.team] || 0) + d.kill;
            r[d.team] = (r[d.team] || 0) + (d.point - d.kill);
            if (d.rank == 1) w[d.team] = (w[d.team] || 0) + 1;
        });

        return Object.entries(t)
            .sort((a, b) => b[1] - a[1])
            .map((x, i) => ({
                pos: i + 1,
                team: x[0],
                total: x[1],
                kill: k[x[0]] || 0,
                rank: r[x[0]] || 0,
                win: w[x[0]] || 0
            }));
    }

    function render() {
        let arr = getBoard();
        let html = "";
        arr.forEach(d => {
            html += `<tr><td>${d.pos}</td><td>${d.team}</td><td>${d.win ? "x" + d.win : "-"}</td><td>${d.kill}</td><td>${d.rank}</td><td>${d.total}</td></tr>`;
        });
        document.getElementById("board").innerHTML = html;
    }

    function sendWhatsApp() {
        let arr = getBoard();
        let text = "🔥 *20msVIP GÜNLÜK SONUÇ*%0A%0A";
        arr.forEach(d => {
            text += `*${d.pos}.* ${d.team} | Total: ${d.total}%0A`;
        });
        window.open("https://wa.me/?text=" + text, "_blank");
    }

    function exportImage() {
        let canvas = document.getElementById("canvas");
        let ctx = canvas.getContext("2d");
        let bg = new Image();
        
        // Dosya ismini istediğin gibi sabit bıraktım
        bg.src = "IMG-20260423-WA0006.jpg"; 

        bg.onload = function() {
            // Görseli yatay (1920x1080) çiziyoruz
            ctx.clearRect(0, 0, 1920, 1080);
            ctx.drawImage(bg, 0, 0, 1920, 1080);

            let arr = getBoard();

            ctx.fillStyle = "#ffffff";
            ctx.font = "bold 24px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            // Koordinatlar şablondaki kutucuklara göre ayarlandı
            let startY = 328;   
            let rowHeight = 49; 

            // SOL TARAF (1-13)
            arr.slice(0, 13).forEach((d, i) => {
                let y = startY + (i * rowHeight);
                ctx.fillText(d.team, 178, y); 
                ctx.fillText(d.win ? "x"+d.win : "-", 298, y);
                ctx.fillText(d.kill, 395, y);
                ctx.fillText(d.rank, 502, y);
                ctx.fillText(d.total, 615, y);
            });

            // SAĞ TARAF (14-25)
            arr.slice(13, 25).forEach((d, i) => {
                let y = startY + (i * rowHeight);
                ctx.fillText(d.team, 742, y); 
                ctx.fillText(d.win ? "x"+d.win : "-", 862, y);
                ctx.fillText(d.kill, 959, y);
                ctx.fillText(d.rank, 1066, y);
                ctx.fillText(d.total, 1179, y);
            });

            let link = document.createElement("a");
            link.download = "20msVIP_Result.png";
            link.href = canvas.toDataURL("image/png", 1.0);
            link.click();
        };
    }

    render();
</script>

</body>
</html>
