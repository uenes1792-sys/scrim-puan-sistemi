<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scrim Control Panel</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: radial-gradient(circle at top, #1a1a1a, #000);
  color:#fff;
  text-align:center;
}

/* HEADER */
h1 {
  margin-top:20px;
  color:#00ffcc;
  text-shadow:0 0 10px #00ffcc;
}

/* INPUT AREA */
input {
  padding:12px;
  margin:6px;
  width:120px;
  border:none;
  border-radius:8px;
  outline:none;
}

button {
  padding:12px 18px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.add {
  background:#00ffcc;
  color:#000;
  box-shadow:0 0 10px #00ffcc;
}

.reset {
  background:#ff0033;
  color:#fff;
  box-shadow:0 0 10px #ff0033;
}

/* TABLE */
table {
  width:95%;
  margin:auto;
  margin-top:20px;
  border-collapse:collapse;
  background:#111;
  box-shadow:0 0 20px rgba(0,255,204,0.2);
  border-radius:10px;
  overflow:hidden;
}

th {
  background:#00ffcc;
  color:#000;
  padding:10px;
}

td {
  padding:10px;
  border-bottom:1px solid #222;
}

tr:hover {
  background:#1f1f1f;
}

/* DELETE BUTTON */
.del {
  background:#ff0033;
  color:#fff;
  border:none;
  padding:6px 10px;
  border-radius:6px;
}
</style>
</head>

<body>

<h1>🔥 SCRIM CONTROL PANEL</h1>

<input id="team" placeholder="Team">
<input id="rank" placeholder="Rank">
<input id="kill" placeholder="Kills">

<br>

<button class="add" onclick="add()">ADD</button>
<button class="reset" onclick="resetAll()">RESET</button>

<table>
<thead>
<tr>
<th>Team</th>
<th>Rank</th>
<th>Kills</th>
<th>Points</th>
<th>Action</th>
</tr>
</thead>

<tbody id="list"></tbody>
</table>

<h3 id="total"></h3>

<script>

// LOAD DATA
let data = JSON.parse(localStorage.getItem("scrim")) || [];

function calc(rank, kill){
  let p = 0;

  if(rank==1) p=15;
  else if(rank==2) p=12;
  else if(rank==3) p=10;
  else if(rank<=5) p=8;
  else if(rank<=10) p=4;
  else if(rank<=15) p=2;

  return p + kill;
}

// ADD TEAM
function add(){
  let team = document.getElementById("team").value;
  let rank = parseInt(document.getElementById("rank").value);
  let kill = parseInt(document.getElementById("kill").value);

  let point = calc(rank, kill);

  data.push({team, rank, kill, point});

  save();
  render();
}

// DELETE
function del(i){
  data.splice(i,1);
  save();
  render();
}

// RESET ALL
function resetAll(){
  if(confirm("Reset all data?")){
    data = [];
    save();
    render();
  }
}

// SAVE TO PHONE MEMORY
function save(){
  localStorage.setItem("scrim", JSON.stringify(data));
}

// SHOW DATA
function render(){
  let html = "";
  let total = 0;

  data.forEach((d,i)=>{
    total += d.point;

    html += `
      <tr>
        <td>${d.team}</td>
        <td>${d.rank}</td>
        <td>${d.kill}</td>
        <td>${d.point}</td>
        <td><button class="del" onclick="del(${i})">X</button></td>
      </tr>
    `;
  });

  document.getElementById("list").innerHTML = html;
  document.getElementById("total").innerText = "TOTAL POINTS: " + total;
}

render();

</script>

</body>
</html>
