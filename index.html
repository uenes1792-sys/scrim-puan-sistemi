<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>20msVIP SCRIM SYSTEM - PRO VERSION</title>
    <style>
        body {
            background: #050505;
            color: #fff;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 30px;
        }
        .header-title { color: #00ffcc; text-transform: uppercase; letter-spacing: 4px; font-size: 28px; margin-bottom: 30px; }
        .control-panel { 
            background: #111; 
            padding: 30px; 
            border-radius: 15px; 
            display: inline-block; 
            border: 2px solid #222;
            box-shadow: 0 0 20px rgba(0,255,204,0.1);
        }
        input, button { padding: 15px; margin: 8px; border-radius: 8px; border: none; font-weight: 800; outline: none; }
        input { background: #1a1a1a; color: #fff; width: 180px; border: 1px solid #333; }
        input:focus { border-color: #00ffcc; background: #222; }
        
        button { cursor: pointer; transition: 0.3s; text-transform: uppercase; min-width: 120px; }
        .add-btn { background: #00ffcc; color: #000; }
        .reset-btn { background: #ff3333; color: #fff; }
        .wa-btn { background: #25D366; color: #fff; }
        .export-btn { background: #007bff; color: #fff; }
        button:hover { transform: scale(1.05); filter: brightness(1.2); }

        table {
            width: 100%;
            max-width: 1100px;
            margin: 40px auto;
            border-collapse: collapse;
            background: #0f0f0f;
            border-radius: 12px;
            overflow: hidden;
        }
        th, td { border: 1px solid #1a1a1a; padding: 15px; font-size: 16px; }
        th { background: #00ffcc; color: #000; font-weight: 900; }
        tr:nth-child(even) { background: #141414; }
    </style>
</head>
<body>

    <div class="header-title">🔥 20msVIP ORGANIZATION PANEL 🔥</div>

    <div class="control-panel">
        <input id="team" placeholder="TAKIM ADI">
        <input id="rank" type="number" placeholder="SIRALAMA">
        <input id="kill" type="number" placeholder="KILL SAYISI">
        <br>
        <button class="add-btn" onclick="addTeam()">TAKIM EKLE</button>
        <button class="reset-btn" onclick="resetData()">SIFIRLA</button>
        <button class="wa-btn" onclick="shareWhatsApp()">WHATSAPP</button>
        <button class="export-btn" onclick="exportResult()">📸 GÖRSEL OLUŞTUR</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>TAKIM</th>
                <th>WWNC</th>
                <th>KILL PUAN</th>
                <th>SIRA PUAN</th>
                <th>TOPLAM</th>
            </tr>
        </thead>
        <tbody id="board"></tbody>
    </table>

    <canvas id="renderCanvas" width="1920" height="1080" style="display:none;"></canvas>

<script>
    let scrimData = JSON.parse(localStorage.getItem("20msvip_scrim_v5")) || [];

    function calculatePoints(rank, kill) {
        let rankP = 0;
        if (rank == 1) rankP = 15;
        else if (rank == 2) rankP = 12;
        else if (rank == 3) rankP = 10;
        else if (rank <= 5) rankP = 8;
        else if (rank <= 10) rankP = 4;
        else if (rank <= 15) rankP = 2;
        return { total: rankP + kill, rankOnly: rankP };
    }

    function addTeam() {
        const tInput = document.getElementById("team");
        const rInput = document.getElementById("rank");
        const kInput = document.getElementById("kill");

        const teamName = tInput.value.trim();
        const rankValue = parseInt(rInput.value);
        const killValue = parseInt(kInput.value);

        if (!teamName || isNaN(rankValue) || isNaN(killValue)) {
            alert("Lütfen tüm alanları geçerli şekilde doldurun!");
            return;
        }

        const pts = calculatePoints(rankValue, killValue);
        scrimData.push({ 
            name: teamName, 
            rank: rankValue, 
            kill: killValue, 
            rankPoint: pts.rankOnly, 
            total: pts.total 
        });

        localStorage.setItem("20msvip_scrim_v5", JSON.stringify(scrimData));
        updateUI();
        
        tInput.value = ""; rInput.value = ""; kInput.value = "";
        tInput.focus();
    }

    function resetData() {
        if(confirm("Tüm verileri silmek istediğine emin misin?")) {
            scrimData = [];
            localStorage.removeItem("20msvip_scrim_v5");
            updateUI();
        }
    }

    function processBoard() {
        let stats = {};
        scrimData.forEach(entry => {
            if(!stats[entry.name]) {
                stats[entry.name] = { total:0, kills:0, rankPts:0, wins:0 };
            }
            stats[entry.name].total += entry.total;
            stats[entry.name].kills += entry.kill;
            stats[entry.name].rankPts += entry.rankPoint;
            if(entry.rank === 1) stats[entry.name].wins += 1;
        });

        return Object.entries(stats)
            .sort((a, b) => b[1].total - a[1].total)
            .map((item, index) => ({
                pos: index + 1,
                name: item[0],
                ...item[1]
            }));
    }

    function updateUI() {
        const board = processBoard();
        let html = "";
        board.forEach(d => {
            html += `<tr>
                <td>${d.pos}</td>
                <td><b>${d.name}</b></td>
                <td>${d.wins > 0 ? 'x'+d.wins : '-'}</td>
                <td>${d.kills}</td>
                <td>${d.rankPts}</td>
                <td><b>${d.total}</b></td>
            </tr>`;
        });
        document.getElementById("board").innerHTML = html;
    }

    function shareWhatsApp() {
        const board = processBoard();
        let msg = "🏆 *20msVIP SCRIM RESULTS* 🏆%0A%0A";
        board.forEach(d => {
            msg += `*${d.pos}.* ${d.name} - *${d.total} Pts*%0A`;
        });
        window.open(`https://wa.me/?text=${msg}`, "_blank");
    }

    function exportResult() {
        const canvas = document.getElementById("renderCanvas");
        const ctx = canvas.getContext("2d");
        const background = new Image();
        background.src = "IMG-20260423-WA0006.jpg"; 

        background.onload = function() {
            ctx.drawImage(background, 0, 0, 1920, 1080);

            const teams = processBoard();
            
            // FONT AYARLARI (MAKSİMUM KALINLIK VE NETLİK)
            ctx.fillStyle = "#FFFFFF";
            ctx.shadowColor = "rgba(0,0,0,0.5)";
            ctx.shadowBlur = 4;
            ctx.font = "900 28px Arial, Helvetica, sans-serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            const startY = 328;   
            const rowGap = 49.2; // Hassas satır aralığı

            // SOL TARAF (1 - 13)
            teams.slice(0, 13).forEach((t, i) => {
                const y = startY + (i * rowGap);
                
                // Koordinatlar Arası Geniş Boşluklar (Hizalı)
                ctx.fillText(t.name.toUpperCase(), 180, y);      // Takım ismi (Büyük Harf)
                ctx.fillText(t.wins > 0 ? "x"+t.wins : "-", 305, y); // WWNC
                ctx.fillText(t.kills, 405, y);                    // Kill
                ctx.fillText(t.rankPts, 510, y);                  // Rank Pts
                ctx.fillText(t.total, 625, y);                    // Total
            });

            // SAĞ TARAF (14 - 25)
            teams.slice(13, 25).forEach((t, i) => {
                const y = startY + (i * rowGap);
                
                ctx.fillText(t.name.toUpperCase(), 750, y);      // Takım ismi
                ctx.fillText(t.wins > 0 ? "x"+t.wins : "-", 875, y); // WWNC
                ctx.fillText(t.kills, 975, y);                    // Kill
                ctx.fillText(t.rankPts, 1080, y);                 // Rank Pts
                ctx.fillText(t.total, 1195, y);                   // Total
            });

            // Otomatik İndirme
            const link = document.createElement("a");
            link.download = "20msVIP_Official_Result.png";
            link.href = canvas.toDataURL("image/png", 1.0);
            link.click();
        };
    }

    // Sayfa açıldığında tabloyu doldur
    updateUI();
</script>

</body>
</html>
