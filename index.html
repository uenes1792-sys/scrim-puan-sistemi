<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>20msVIP SCRIM SYSTEM PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

<style>
:root{
  --neon:#00ffd0;
  --gold:#ffcc00;
  --silver:#c0c0c0;
  --bronze:#cd7f32;
  --green:#00ff88;
  --red:#ff3e3e;
}

html{background:#000;}

body{
  margin:0;
  min-height:100vh;
  background: radial-gradient(circle,#0a0a0a,#000);
  color:#fff;
  font-family:'Rajdhani';
  text-align:center;
}

body::after{
  content:"";
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  height:100%;
  background:#000;
  z-index:-2;
}

table, tbody{background:transparent;}

#splash{background:#000;}

h1{font-family:'Orbitron';color:var(--gold);}

.container{
  background:#111;
  padding:20px;
  border-radius:15px;
  display:inline-block;
}

input{
  width:60px;
  padding:8px;
  margin:3px;
  text-align:center;
  background:#000;
  color:#fff;
  border-radius:8px;
  border:1px solid #222;
}

.label{font-size:12px;opacity:.7}

.match{margin:10px;padding:10px;background:#0f0f0f;border-radius:10px;}
.players{display:flex;justify-content:center;gap:5px;}

button{padding:8px 12px;margin:5px;border:none;border-radius:8px;font-weight:700;cursor:pointer;}
.add{background:var(--neon);color:#000;}
.reset{background:red;color:#fff;}
.wa{background:#25D366;width:100%;}

table{width:95%;margin:20px auto;border-collapse:collapse;}
th{background:var(--neon);color:#000;}
td{padding:8px;border-bottom:1px solid #222;}

tr:nth-child(1){color:var(--gold);}
tr:nth-child(2){color:var(--silver);}
tr:nth-child(3){color:var(--bronze);}

.green{color:var(--green);}
.red{color:var(--red);}

/* 🔥 LIVE BAR */
.liveBar{
display:flex;
align-items:center;
justify-content:space-between;
margin-top:15px;
gap:10px;
}

/* 🔥 LIVE TEXT */
.liveBar h3{
margin:0;
flex:1;
text-align:center;
font-size:20px;
color:#fff;
text-shadow:0 0 10px #00ffd0;
}

/* 🔥 SOSYAL YAZILAR (BÜYÜTÜLDÜ) */
.leftSocial,
.rightSocial{
font-size:16px;
font-weight:700;
opacity:1;
white-space:nowrap;
color:#fff;
text-shadow:0 0 8px #00ffd0, 0 0 15px #00ffd0;
transition:0.3s;
}

.leftSocial:hover,
.rightSocial:hover{
color:#00ffd0;
text-shadow:0 0 15px #00ffd0, 0 0 30px #00ffd0;
transform:scale(1.05);
}

/* 🔥 SPLASH */
#splash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
transition:0.5s;
}

.box{
text-align:center;
animation:fadeIn 1.5s ease;
}

.box h1{
font-family:'Orbitron';
font-size:45px;
color:#ffcc00;
text-shadow:0 0 30px #ffcc00;
animation:zoom 1.2s ease;
}

.box p{
color:#00ffd0;
letter-spacing:3px;
margin-top:10px;
opacity:0;
animation:fadeText 1s ease forwards;
animation-delay:1.2s;
}

@keyframes zoom{
from{transform:scale(0.5);}
to{transform:scale(1);}
}

@keyframes fadeText{
to{opacity:1;}
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}
</style>
</head>

<body>

<div id="splash">
  <div class="box">
    <h1>20msVIP</h1>
    <p>RESULT PANEL</p>
  </div>
</div>

<h1>🔥 20msVIP RESULT PANEL 🔥</h1>

<div class="container">

<input id="team" placeholder="TEAM">

<div class="match">
<b>MATCH 1 (ERANGEL)</b>
<div class="label">Sıra</div>
<input id="r1">
<div class="label">Kills</div>
<div class="players">
<input id="m1p1" placeholder="P1">
<input id="m1p2" placeholder="P2">
<input id="m1p3" placeholder="P3">
<input id="m1p4" placeholder="P4">
</div>
</div>

<div class="match">
<b>MATCH 2 (MIRAMAR)</b>
<div class="label">Sıra</div>
<input id="r2">
<div class="label">Kills</div>
<div class="players">
<input id="m2p1" placeholder="P1">
<input id="m2p2" placeholder="P2">
<input id="m2p3" placeholder="P3">
<input id="m2p4" placeholder="P4">
</div>
</div>

<div class="match">
<b>MATCH 3 (ERANGEL)</b>
<div class="label">Sıra</div>
<input id="r3">
<div class="label">Kills</div>
<div class="players">
<input id="m3p1" placeholder="P1">
<input id="m3p2" placeholder="P2">
<input id="m3p3" placeholder="P3">
<input id="m3p4" placeholder="P4">
</div>
</div>

<div class="match">
<b>MATCH 4 (RONDO)</b>
<div class="label">Sıra</div>
<input id="r4">
<div class="label">Kills</div>
<div class="players">
<input id="m4p1" placeholder="P1">
<input id="m4p2" placeholder="P2">
<input id="m4p3" placeholder="P3">
<input id="m4p4" placeholder="P4">
</div>
</div>

<div class="match">
<input id="bonus" placeholder="+">
<input id="penalty" placeholder="-">
</div>

<button class="add" onclick="add()">EKLE</button>
<button class="reset" onclick="resetAll()">SIFIRLA</button>
<button class="wa" onclick="sendWhatsApp()">WHATSAPP</button>

<br>
<button onclick="saveData()">KAYDET</button>
<button onclick="loadData()">YÜKLE</button>

<div class="liveBar">
  <span class="leftSocial">📸 Instagram: 20msVİP</span>
  <h3 id="preview">Live: -</h3>
  <span class="rightSocial">📱 TikTok: 20msVİP</span>
</div>

</div>

<table>
<thead>
<tr>
<th>#</th><th>TEAM</th><th>WWNC</th><th>KILL</th><th>RANK</th><th>TOTAL</th><th>⚙️</th>
</tr>
</thead>
<tbody id="board"></tbody>
</table>

<script>
let data = JSON.parse(localStorage.getItem("scrimData")) || [];
let editIndex=-1;

team.oninput=()=> team.value=team.value.toUpperCase();
team.onblur=()=>{
if(team.value && !team.value.endsWith("ESPORTS"))
team.value += " ESPORTS";
};

document.querySelectorAll("input").forEach(i=>{
if(i.id!=="team"){
i.addEventListener("keydown",e=>{
if(["Backspace","Delete","ArrowLeft","ArrowRight","Tab","Enter"].includes(e.key)) return;
if(!/[0-9]/.test(e.key)) e.preventDefault();
});
i.addEventListener("paste",e=>e.preventDefault());
}
});

let inputs=[...document.querySelectorAll("input")];
inputs.forEach((i,idx)=>{
i.onkeydown=e=>{
if(e.key==="Enter"){
e.preventDefault();
inputs[idx+1]?.focus();
}
};
});

function rp(r){return [0,10,6,5,4,3,2,1,1][r]||0;}

function live(){
let k=0,rk=0;
for(let i=1;i<=4;i++){
let r=+document.getElementById("r"+i).value||0;
let kill=(+document.getElementById("m"+i+"p1").value||0)+(+document.getElementById("m"+i+"p2").value||0)+(+document.getElementById("m"+i+"p3").value||0)+(+document.getElementById("m"+i+"p4").value||0);
if(r){k+=kill;rk+=rp(r);}
}
let b=Math.abs(+bonus.value||0);
let p=Math.abs(+penalty.value||0);
preview.innerText=`Live → ${k+rk+b-p}`;
}

document.querySelectorAll("input").forEach(i=>i.oninput=live);

function add(){
if(data.length>=25 && editIndex==-1) return alert("Max 25 takım!");
let name=team.value.trim();
if(!name) return;

let k=0,rk=0,w=0,matches=[];
for(let i=1;i<=4;i++){
let r=+document.getElementById("r"+i).value||0;
let p1=+document.getElementById("m"+i+"p1").value||0;
let p2=+document.getElementById("m"+i+"p2").value||0;
let p3=+document.getElementById("m"+i+"p3").value||0;
let p4=+document.getElementById("m"+i+"p4").value||0;
let kill=p1+p2+p3+p4;
if(r){k+=kill;rk+=rp(r);}
if(r==1) w++;
matches.push({r,p1,p2,p3,p4});
}

let b=Math.abs(+bonus.value||0);
let p=Math.abs(+penalty.value||0);

let obj={name,k,r:rk,t:k+rk+b-p,w,b,p,matches};

if(editIndex==-1) data.push(obj);
else{data[editIndex]=obj;editIndex=-1;}

localStorage.setItem("scrimData",JSON.stringify(data));
render();
inputs.forEach(i=>i.value="");
preview.innerText="Live: -";
}

function render(){
let sorted = data.map((x,i)=>({...x,idx:i})).sort((a,b) => {
    if (b.t !== a.t) return b.t - a.t; 
    if (b.w !== a.w) return b.w - a.w; 
    return b.k - a.k;                  
});

board.innerHTML=sorted.map((x,i)=>{
let extra=(x.b?`<span class="green">+${x.b}</span>`:"")+(x.p?` <span class="red">-${x.p}</span>`:"");
return `<tr>
<td>${i+1}</td>
<td>${x.name}</td>
<td>${x.w? "x"+x.w:"-"}</td>
<td>${x.k}</td>
<td>${x.r}</td>
<td>${x.t} ${extra}</td>
<td>
<button onclick="editTeam(${x.idx})">✏️</button>
<button onclick="deleteTeam(${x.idx})">❌</button>
</td>
</tr>`;
}).join("");
}

function editTeam(i){
let x=data[i];
team.value=x.name;
bonus.value=x.b;
penalty.value=x.p;
x.matches.forEach((m,idx)=>{
document.getElementById("r"+(idx+1)).value=m.r;
document.getElementById("m"+(idx+1)+"p1").value=m.p1;
document.getElementById("m"+(idx+1)+"p2").value=m.p2;
document.getElementById("m"+(idx+1)+"p3").value=m.p3;
document.getElementById("m"+(idx+1)+"p4").value=m.p4;
});
editIndex=i;
}

function deleteTeam(i){
if(!confirm("Silinsin mi?")) return;
data.splice(i,1);
localStorage.setItem("scrimData",JSON.stringify(data));
render();
}

function sendWhatsApp(){
let sorted = [...data].sort((a,b) => {
    if (b.t !== a.t) return b.t - a.t;
    if (b.w !== a.w) return b.w - a.w;
    return b.k - a.k;
});

let msg="20msVIP DAILY RESULT\n\n";
sorted.forEach((x,i)=>{
let mvp = (i<3) ? " (MVP)" : "";
let wwnc = x.w > 0 ? "x"+x.w : "-";

// WhatsApp için ceza ve bonus yazısı ayarlandı
let extraText = "";
if(x.b > 0) extraText += ` (+${x.b} Bonus)`;
if(x.p > 0) extraText += ` (-${x.p} Ceza)`;

msg+=`${i+1}. ${x.name}${mvp}\nWWNC: ${wwnc}\nKill: ${x.k}\nRank: ${x.r}\nTotal: ${x.t}${extraText}\n\n`;
});
window.open("https://wa.me/?text="+encodeURIComponent(msg));
}

function resetAll(){data=[];localStorage.removeItem("scrimData");render();}
function saveData(){localStorage.setItem("savedScrim",JSON.stringify(data));alert("Kaydedildi");}
function loadData(){data=JSON.parse(localStorage.getItem("savedScrim"))||[];render();}

render();

setTimeout(()=>{
document.getElementById("splash").style.opacity="0";
setTimeout(()=>{
document.getElementById("splash").style.display="none";
},500);
},3000);

</script>
</body>
</html>
